name: Backend Deploy Staging

on:
  push:
    branches: [ staging ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t pharma-backend:staging .

      - name: Run migrations
        run: |
          docker run --rm \
            --network host \
            --env-file /var/www/app/.env \
            -v /var/www/app/.env:/var/www/app/.env \
            pharma-backend:staging \
            /app/scripts/run_migration.sh

      - name: Deploy backend
        run: |
          docker rm -f pharma-backend || true
          docker run -d \
            --name pharma-backend \
            --network host \
            --restart unless-stopped \
            --env-file /var/www/app/.env \
            -v /var/www/app/uploads:/app/uploads \
            -v /var/www/app/logger:/logger \
            pharma-backend:staging