name: Pharma-backend CI/CD

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

env:
  CONTAINER_NAME: pharma-backend
  SSH_HOST: ${{ secrets.DEV_SERVER_IP }}
  SSH_USER: ${{ secrets.DEV_SERVER_USERNAME }}
  SSH_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
  DB_URL: ${{ secrets.DEV_PHARMA_DATABASE_URL }}
  PORT: 8080:8080

jobs:
  build_and_transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t pharma-backend:${{ github.sha }} .

      - name: Save Docker image as tarball
        run: docker save pharma-backend:${{ github.sha }} -o pharma-backend.tar

      - name: Copy Docker image to remote server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          source: "pharma-backend.tar"
          target: "/tmp/"

  migrate:
    needs: build_and_transfer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install migrate tool
        run: |
          wget https://github.com/golang-migrate/migrate/releases/download/v4.14.1/migrate.linux-amd64.tar.gz
          tar -xvf migrate.linux-amd64.tar.gz
          mv migrate.linux-amd64 migrate
          chmod +x migrate

      - name: Run Migrations
        run: |
          ./migrate -path=$PWD/migrations -database="${{ env.DB_URL }}" up

  deploy:
    needs: build_and_transfer
    runs-on: ubuntu-latest
    steps:
      - name: SSH into server and load + run Docker container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            docker load -i /tmp/pharma-backend.tar
            echo "Stopping and removing old container (if exists)..."
            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm "${{ env.CONTAINER_NAME }}" || true

            echo "Tag current 'latest' image as 'rollback' (if exists)..."
            docker tag pharma-backend:latest pharma-backend:rollback || true

            echo "Tag new image as latest..."
            docker tag pharma-backend:${{ github.sha }} pharma-backend:latest

            echo "Starting new container..."
            if ! docker run -d --name "${{ env.CONTAINER_NAME }}" \
              -p "${{ env.PORT }}" \
              --env-file /var/www/app/.env \
              -v /var/www/app/uploads:/app/uploads \
              pharma-backend:latest; then

              echo "New container failed to start. Rolling back..."
              docker stop "${{ env.CONTAINER_NAME }}" || true
              docker rm "${{ env.CONTAINER_NAME }}" || true

              docker run -d --name "${{ env.CONTAINER_NAME }}" \
                -p "${{ env.PORT }}" \
                --env-file /var/www/app/.env \
                -v /var/www/app/uploads:/app/uploads \
                pharma-backend:rollback || {
                  echo "Rollback failed! Manual intervention required." && exit 1
                }
            fi

            echo "Cleaning up older images (keeping latest 3)..."
            docker image prune -f
            docker images --filter=reference="pharma-backend*" --format "{{.Repository}}:{{.Tag}}" | \
              sort | head -n -3 | xargs -r docker rmi

