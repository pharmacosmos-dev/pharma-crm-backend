name: Pharma-backend CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  REPO_NAME: ${{ github.repository }}
  CONTAINER_NAME: pharma-backend
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  SSH_HOST: ${{ secrets.SERVER_IP }}
  SSH_USER: ${{ secrets.SERVER_USERNAME }}
  SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_PASS: ${{ secrets.SERVER_PASSWORD }}
  DB_URL: ${{ secrets.PHARMA_DATABASE_URL }}
  PORT: 8090:8090
  SERVER_PORT: 2002

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: "${{ env.DOCKER_USERNAME }}/pharma-backend:${{ github.sha }}"
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/pharma-backend:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/pharma-backend:buildcache,mode=max
  
  migrate:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Run migrations on server
        uses: appleboy/ssh-action@master
        with:
          host: "${{ env.SSH_HOST }}"
          username: "${{ env.SSH_USER }}"
          key: "${{ env.SSH_KEY }}"
          port: "${{ env.SERVER_PORT }}"
          script: |
            set -e
            docker login -u ${{ env.DOCKER_USERNAME }} -p ${{ env.DOCKER_PASSWORD }}
            # ensure image is present
            docker pull "${{ env.DOCKER_USERNAME }}/pharma-backend:${{ github.sha }}"
            # Option A (recommended if migrations are backward-compatible):
            # run migrations without stopping the old app
            docker run --rm \
              --env-file /var/www/app/.env \
              -v /var/www/app/.env:/var/www/app/.env \
              --network host \
              "${{ env.DOCKER_USERNAME }}/pharma-backend:${{ github.sha }}" \
              /app/scripts/run_migration.sh

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: "${{ env.SSH_HOST }}"
          username: "${{ env.SSH_USER }}"
          key: "${{ env.SSH_KEY }}"
          port: "${{ env.SERVER_PORT }}"
          script: |
            docker login -u ${{ env.DOCKER_USERNAME }} -p ${{ env.DOCKER_PASSWORD }}
            docker pull "${{ env.DOCKER_USERNAME }}/pharma-backend:${{ github.sha }}"
            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm "${{ env.CONTAINER_NAME }}" || true
            docker run -d --name "${{ env.CONTAINER_NAME }}" --network host  -p "${{ env.PORT }}" --env-file /var/www/app/.env -v /var/www/app/uploads:/app/uploads "${{ env.DOCKER_USERNAME }}/pharma-backend:${{ github.sha }}"