name: Pharma-backend CI/CD

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

env:
  REPO_NAME: ${{ github.repository }}
  CONTAINER_NAME: pharma-backend
  REGISTRY: ghcr.io
  SSH_HOST: ${{ secrets.SERVER_IP }}
  SSH_USER: ${{ secrets.SERVER_USERNAME }}
  SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  DB_URL: ${{ secrets.PHARMA_DATABASE_URL }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: "${{ env.REGISTRY }}/${{ env.REPO_NAME }}:${{ github.sha }}"
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_NAME }}:buildcache,mode=max
  

  migrate:
    needs: build_and_push
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install migrate tool
        run: |
            wget https://github.com/golang-migrate/migrate/releases/download/v4.14.1/migrate.linux-amd64.tar.gz
            tar -xvf migrate.linux-amd64.tar.gz
            mv migrate.linux-amd64 migrate
            chmod +x migrate

      - name: Run Migrations
        run: |
            ./migrate -path=$PWD/migrations -database="${{ env.DB_URL }}" up

  deploy:
    needs: [build_and_push, migrate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Executing remote SSH commands to deploy using Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: "${{ env.SSH_HOST }}"
          username: "${{ env.SSH_USER }}"
          key: "${{ env.SSH_KEY }}"
          script: |
            # Log in to Docker registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login -u ${{ github.actor }} --password-stdin ${{ env.REGISTRY }}

            # Pull the latest image
            docker pull "${{ env.REGISTRY }}/${{ env.REPO_NAME }}:${{ github.sha }}"

            # Navigate to deployment directory
            cd /var/www/pharma-backend

            # Update image in docker-compose.prod.yml
            sed -i 's|image:.*|image: '"${{ env.REGISTRY }}/${{ env.REPO_NAME }}:${{ github.sha }}"'|' docker-compose.prod.yml

            # Restart services using both dev and prod compose files
            docker compose -f docker-compose.dev.yml down || true
            docker compose -f docker-compose.dev.yml up -d
