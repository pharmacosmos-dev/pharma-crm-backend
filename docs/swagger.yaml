info:
  contact: {}
  description: This is a sample server caller server.
  termsOfService: http://swagger.io/terms/
  title: Pharma API docs
  version: "1.0"
paths:
  /auto-order:
    post:
      consumes:
      - application/json
      description: Create auto order
      parameters:
      - description: Auto order information
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/domain.AutoOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/v1.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/v1.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/v1.Response'
      security:
      - BearerAuth: []
      summary: Create auto order
      tags:
      - auto_orders
  /auto-order-detail/change-quantity/{id}:
    put:
      consumes:
      - application/json
      description: Change adjusted order quantity
      parameters:
      - description: ID
        in: path
        name: id
        required: true
        type: string
      - description: Adjusted Order Quantity
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/domain.AdjustedOrderQuantity'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/v1.Response'
