
services:
  backend:
    container_name: pharma-backend
    build:
      context: .
    ports:
      - "8080:8080"
    platform: linux/arm64
    env_file:
      - .env

  minio-storage:
    container_name: minio
    image: bitnami/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    platform: linux/arm64
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
