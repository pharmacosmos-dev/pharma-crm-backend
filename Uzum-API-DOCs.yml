openapi: 3.0.1
info:
  title: API YGrocery
  version: 1.0.0
servers:
  - url: //localhost/
security:
  - OAuth2:
      - read
      - write
tags:
  - name: Authentication
    description: Аутентификация в системе
  - name: Nomenclature
    description: Номенклатура
  - name: Orders
    description: Прием и обновление заказов от Uzum Tezkor
paths:
  /v1/nomenclature/{storeId}/composition:
    get:
      tags:
        - Nomenclature
      summary: Актуальная номенклатура продуктов
      description: "Позиции, содержащие схематические или логические несоответстви\
        я (слишком длинная строка, цена равная 0.00) могут быть проигнорированы. А\
        ктуальная версия модели ответа - application/vnd.eda.picker.nomenclature.v1+json"
      operationId: partner.nomenclature.composition.get
      parameters:
        - name: storeId
          in: path
          description: Уникальный идентификатор магазина в системе партнёра
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Актуальная номенклатура
          content:
            application/vnd.eda.picker.nomenclature.v1+json:
              schema:
                $ref: '#/components/schemas/PickerNomenclatureV1'
            application/vnd.eda.picker.nomenclature.v2+json:
              schema:
                $ref: '#/components/schemas/PickerNomenclatureV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/PickerNomenclatureV1'
            application/json:
              schema:
                $ref: '#/components/schemas/PickerNomenclatureV1'
        "400":
          description: "Ошибка в запросе, в ответе список ошибок"
          content:
            application/vnd.eda.picker.nomenclature.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.nomenclature.v2+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "401":
          description: "Не пройдена авторизация - истек токен, либо не был передан\
            \ в запросе, в ответе список ошибок"
          content:
            application/vnd.eda.picker.nomenclature.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.nomenclature.v2+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "404":
          description: "Не найден ресурс, в ответе список ошибок"
          content:
            application/vnd.eda.picker.nomenclature.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.nomenclature.v2+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "500":
          description: "Внутренние ошибки сервера, в ответе список ошибок"
          content:
            application/vnd.eda.picker.nomenclature.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.nomenclature.v2+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        default:
          description: Остальные ошибки сервера
          content:
            application/vnd.eda.picker.nomenclature.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.nomenclature.v2+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
      security:
        - OAuth2:
            - read
  /v1/nomenclature/{storeId}/availability:
    get:
      tags:
        - Nomenclature
      summary: Список продуктов с указанием их остатков
      description: "Перечисленным продуктам обновляется остатки значением из поля\
        \ stock.  В зависимости от значения поля также обновляется и доступность П\
        озиции, содержащие схематические или логические несоответствия (слишком дл\
        инная строка, остаток равен -10.00) могут быть проигнорированы. Актуальная\
        \ версия модели ответа - application/vnd.eda.picker.availability.v1+json"
      operationId: partner.nomenclature.availability.get
      parameters:
        - name: storeId
          in: path
          description: Уникальный идентификатор магазина в системе партнёра
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Список продуктов со значением их доступности (остатков). \
            \ Отсутствующие в списке продукты, будут недоступны для заказа"
          content:
            application/vnd.eda.picker.availability.v1+json:
              schema:
                $ref: '#/components/schemas/NomenclatureAvailabilityV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/NomenclatureAvailabilityV1'
            application/json:
              schema:
                $ref: '#/components/schemas/NomenclatureAvailabilityV1'
        "400":
          description: "Ошибка в запросе, в ответе список ошибок"
          content:
            application/vnd.eda.picker.availability.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "401":
          description: "Не пройдена авторизация - истек токен, либо не был передан\
            \ в запросе, в ответе список ошибок"
          content:
            application/vnd.eda.picker.availability.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "404":
          description: "Не найден ресурс, в ответе список ошибок"
          content:
            application/vnd.eda.picker.availability.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "500":
          description: "Внутренние ошибки сервера, в ответе список ошибок"
          content:
            application/vnd.eda.picker.availability.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        default:
          description: Остальные ошибки сервера
          content:
            application/vnd.eda.picker.availability.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eda.picker.errors.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
      security:
        - OAuth2:
            - read
  /order:
    post:
      tags:
        - Orders
      summary: Создание заказа в системе ресторана
      description: MarketplaceOrder - схема заказа при доставке силами партнера. YandexOrder
        - схема заказа при доставке силами UzumTezkor. Актуальная версия модели запроса
        - application/vnd.eats.order.v2+json
      operationId: partner.order.create
      requestBody:
        content:
          application/vnd.eats.order.v2+json:
            schema:
              type: object
          application/vnd.eats.order.marketplace.v3+json:
            schema:
              type: object
          application/vnd.eats.order.yandex.v3+json:
            schema:
              type: object
          application/json:
            schema:
              type: object
        required: true
      responses:
        "200":
          description: Заказ успешно обработан внутренней системой ресторана
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                    description: Идентификатор созданного заказа в системе партнера.
                      Формат свободный. Рекомендуется UUID4
                    example: 03d3b69b-331c-4f84-b2c4-888b30320e63
                  result:
                    type: string
                    example: OK
        "400":
          description: "Bad request. Ошибка в параметрах, в ответе список ошибок в\
            алидации"
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "401":
          description: "Не пройдена авторизация - истек токен, либо не был передан\
            \ в запросе"
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRequiredResponse'
        "500":
          description: Внутренние ошибки сервера
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        default:
          description: Остальные ошибки сервера
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
      security:
        - OAuth2:
            - read
            - write
      x-codegen-request-body-name: body
  /order/{orderId}:
    get:
      tags:
        - Orders
      summary: Выдача актуальной информации о заказе в системе ресторана
      description: Актуальная версия модели ответа - application/vnd.eats.order.v2+json
      operationId: partner.order.get
      parameters:
        - name: orderId
          in: path
          description: Идентификатор заказа в системе партнера
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Информация о заказе успешно выдана
          content:
            application/vnd.eats.order.v2+json:
              schema:
                $ref: '#/components/schemas/YGroceryOrderV2'
            application/vnd.eats.order.yandex.v3+json:
              schema:
                $ref: '#/components/schemas/YGroceryOrderV2'
            application/json:
              schema:
                $ref: '#/components/schemas/YGroceryOrderV2'
        "400":
          description: "Bad request. Ошибка в параметрах, в ответе список ошибок в\
            алидации"
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/vnd.eats.order.v2+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eats.order.yandex.v3+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "401":
          description: "Не пройдена авторизация - истек токен, либо не был передан\
            \ в запросе"
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/vnd.eats.order.v2+json:
              schema:
                $ref: '#/components/schemas/AuthorizationRequiredResponse'
            application/vnd.eats.order.yandex.v3+json:
              schema:
                $ref: '#/components/schemas/AuthorizationRequiredResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRequiredResponse'
        "404":
          description: Заказ не найден в системе
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/vnd.eats.order.v2+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eats.order.yandex.v3+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "500":
          description: Внутренние ошибки сервера
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/vnd.eats.order.v2+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eats.order.yandex.v3+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        default:
          description: Остальные ошибки сервера
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/vnd.eats.order.v2+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/vnd.eats.order.yandex.v3+json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
      security:
        - OAuth2:
            - read
            - write
    put:
      tags:
        - Orders
      summary: Обновление заказа в системе ресторана
      description: Передаётся объект заказа целиком. Актуальная версия модели запроса
        - application/vnd.eats.order.v2+json
      operationId: partner.order.update
      parameters:
        - name: orderId
          in: path
          description: Идентификатор заказа в системе партнера
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/vnd.eats.order.v2+json:
            schema:
              type: object
          application/vnd.eats.order.marketplace.v3+json:
            schema:
              type: object
          application/vnd.eats.order.yandex.v3+json:
            schema:
              type: object
          application/json:
            schema:
              type: object
        required: true
      responses:
        "200":
          description: Обновление заказа успешно обработано внутренней системой ресторана
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: OK
        "400":
          description: "Bad request. Ошибка в параметрах, в ответе список ошибок в\
            алидации"
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        "401":
          description: "Не пройдена авторизация - истек токен, либо не был передан\
            \ в запросе"
          headers:
            Cache-Control:
              schema:
