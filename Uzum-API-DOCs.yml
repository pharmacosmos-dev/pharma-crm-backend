          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizationRequiredResponse'
        "404":
          description: Заказ не найден в системе
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
