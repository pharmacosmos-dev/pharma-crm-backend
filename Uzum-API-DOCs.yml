              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        default:
          description: Остальные ошибки сервера
          headers:
            Cache-Control:
              schema:
