            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
        default:
          description: Остальные ошибки сервера
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorListV1'
      security:
        - OAuth2:
            - read
            - write
      x-codegen-request-body-name: body
    delete:
      tags:
        - Orders
      summary: Отмена заказа в системе ресторана
      operationId: partner.order.cancel
      parameters:
        - name: orderId
          in: path
          description: Идентификатор заказа в системе партнера
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCancellation'
        required: true
      responses:
        "200":
          description: Заказ успешно отменен в ресторане
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            Vary:
              schema:
                type: string
            Expires:
              schema:
                type: string
            Pragma:
              schema:
                type: string
          content: {}
        "400":
          description: "Bad request. Ошибка в параметрах, в ответе список ошибок в\
