components:
  schemas:
    AuthenticationRequest:
      required:
        - client_id
        - client_secret
        - grant_type
        - scope
      type: object
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        grant_type:
          type: string
        scope:
          type: string
      example:
        client_id: "123123123"
        client_secret: ABCDEFGHIJKLMNOPQRSTUVWXYZ
        grant_type: client_credentials
        scope: read write
    AuthenticationResponse:
      required:
        - access_token
      type: object
      properties:
        access_token:
          type: string
      description: Модель результата успешной аутентификации. Единственное обязательное
        поле - access_token. Остальные возможные по спецификации поля - опциональны
        и не используются на стороне Uzum Tezkor
      example:
        access_token: ABCDEFGHIJKLMNOPQRSTUVWXYZ
    AuthorizationRequiredResponse:
      required:
        - reason
      type: object
      properties:
        reason:
          type: string
          description: "Причина, по которой не прошла авторизация"
          example: Access token has been expired. You should request a new one
    ErrorListV1:
      type: array
      items:
        required:
          - code
          - description
        type: object
        properties:
          code:
            type: integer
            description: Числовой код ошибки
            nullable: false
            example: 100
          description:
            type: string
            description: Сообщение об ошибке
            nullable: false
            example: Description of error
    NomenclatureAvailabilityV1:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          description: Количесто продуктов в наличии
          items:
            required:
              - id
              - stock
            type: object
            properties:
              id:
                type: string
                description: "Внутренний уникальный идентификатор продукта в систе\
                  ме партнера. Может быть любым значением, приводимым к строке. Ре\
                  комендация - UUID4"
                example: eff0cec0-058c-4d53-b524-1c04ac24fb51
              stock:
                type: number
                description: Остаток продукта. При 0 блюдо пропадает из выдачи.
                format: float
                example: 5.5
                default: 0.0
      description: Актуальная версия модели доступности меню

    PickerNomenclatureV1Image:
      required:
        - hash
        - url
      type: object
      properties:
        hash:
          type: string
          description: "SHA1-хэш от содержимого файла изображения. Рас\
            считывается партнером, служит признаком уникальности. В сл\
            учае если он меняется, Uzum Tezkor перезагружает картинку"
        url:
          type: string
          description: Ссылка на изображение для скачивания
          format: uri
      description: Изображение блюда

    PickerNomenclatureV1:
      required:
        - categories
        - items
      type: object
      properties:
        categories:
          type: array
          description: Категории
          items:
            required:
              - id
              - name
            type: object
            properties:
              id:
                maxLength: 64
                type: string
                description: "Внутренний идентификатор категории в системе партнер\
                  а. Может быть любым значением, приводимым к строке. Рекомендация\
                  \ - UUID4"
                example: 5af86d5a-d92d-4e07-9271-aea0f7ef95a6
              images:
                type: array
                items:
                  required:
                    - hash
                    - url
                  type: object
                  properties:
                    hash:
                      type: string
                      description: "SHA1-хэш от содержимого файла изображения.  Ра\
                        ссчитывается партнером, служит признаком уникальности."
                    url:
                      type: string
                      description: Ссылка на изображение для скачивания
                      format: uri
                  description: Изображение категории
              name:
                type: string
                description: Наименование категории (например "Супы")
                example: Супы
              parentId:
                maxLength: 64
                type: string
                description: Уникальный идентификатор родительской категории для древовидной
                  структуры
                example: 5af86d5a-d92d-4e07-9271-aea0f7ef95a6
              sortOrder:
                type: integer
                description: "Порядок сортировки от меньшего к большему. Если не у\
                  казан, считаем за 100"
                example: 0
        items:
          type: array
          description: Список продуктов доступных для заказа
          items:
            required:
              - barcode
              - categoryId
              - description
              - id
              - images
              - isCatchWeight
              - measure
              - name
              - price
              - vendorCode
            type: object
            properties:
              barcode:
                required:
                  - value
                  - weightEncoding
                type: object
                properties:
                  type:
                    type: string
                    description: Тип штрихкода
                    example: ean13
                    enum:
                      - auspost
                      - ausredirect
                      - ausreply
                      - ausroute
                      - aztec
                      - c25iata
                      - 25ind
                      - 25inter
                      - 25logic
                      - 25matrix
                      - codabar
                      - codablockf
                      - code11
                      - code100
                      - code128
                      - code128b
                      - code16k
                      - code39
                      - code49
                      - code93
                      - daft
                      - datamatrix
                      - dotcode
                      - dpident
                      - dpleit
                      - ean128
                      - ean13
                      - ean14
                      - eanx
                      - eanx_chk
                      - excode39
                      - fim
                      - flat
                      - hanxin
                      - hibc_128
                      - hibc_39
                      - hibc_aztec
                      - hibc_blockf
                      - hibc_dm
                      - hibc_micpdf
                      - hibc_pdf
                      - hibc_qr
                      - isbnx
                      - itf14
                      - japanpost
                      - kix
                      - koreapost
                      - logmars
                      - mailmark
                      - maxicode
                      - micropdf417
                      - microqr
                      - msi_plessey
                      - nve18
                      - onecode
                      - pdf417
                      - pdf417trunc
                      - pharma
                      - pharma_two
                      - planet
                      - plessey
                      - postnet
                      - pzn
                      - qrcode
                      - rm4scc
                      - rss14
                      - rss14stack
                      - rss14stack_omni
                      - rss_exp
                      - rss_expstack
                      - rss_ltd
                      - telepen
                      - telepen_num
                      - upca
                      - upca_chk
                      - upce
                      - upce_chk
                      - vin
                  value:
                    type: string
                    description: Штрихкод продукта
                    example: "987654321098"
                  values:
                    type: array
                    description: Список штрихкодов продукта
                    items:
                      type: string
                      example: "987654321098"
                  weightEncoding:
                    type: string
                    description: Алгоритм кодирования веса в штрихкоде
                    example: ean13-tail-gram-4
                    enum:
                      - none
                      - ean13-tail-gram-4
                      - ean13-tail-gram-5
                description: Штрихкод продукта
              categoryId:
                maxLength: 64
                type: string
                description: Идентификатор категории в системе партнера
                example: fa494dc1-2578-4adb-a8fa-e270de8c3d28
              description:
                type: object
                properties:
                  composition:
                    type: string
                    description: Сведения о составе
                  expiresIn:
                    type: string
                    description: Срок годности в днях
                  general:
                    type: string
                    description: Общее описание продукта
                  nutritionalValue:
                    type: string
                    description: Пищевая ценность
                  packageInfo:
                    type: string
                    description: Сведения об упаковке
                  purpose:
                    type: string
                    description: Назначение
                  storageRequirements:
                    type: string
                    description: Условия хранения
                  vendorCountry:
                    type: string
                    description: Страна изготовления
                  vendorName:
                    type: string
                    description: Производитель
                description: Полное описание блюда
              id:
                maxLength: 64
                type: string
                description: "Внутренний идентификатор системе партнера. Может быт\
                  ь любым значением, приводимым к строке. Рекомендация - UUID4"
                example: e6709e9a-d3ab-4d1e-aa69-7ce30073cbc9
              images:
                type: array
                items:
                  $ref: '#/components/schemas/PickerNomenclatureV1Image'
              isCatchWeight:
                type: boolean
                description: "Флаг указывающий весовой продукт, или нет"
                example: false
              location:
                type: string
                description: Расположение продукта в маганизе
                example: Бакалея. Линия 8
              measure:
                type: object
                properties:
                  quantum:
                    type: number
                    description: Наименьшее количество продукта (квант) доступное
                      для заказа.  Значение от value. Для весовых товаров (isCatchWeight=true)
                      должно быть равно true
                    format: float
                  unit:
                    type: string
                    description: Единица измерения
                    example: GRM
                    enum:
                      - MLT
                      - GRM
                  value:
                    type: integer
                    description: Значение измерения
                    example: 1000
                description: Характеристика измерений товара - например вес или объем
              name:
                type: string
                example: Молоко Домик в деревне
                default: Наименование продукта
              oldPrice:
                type: number
                description: Старая цена продукта. Используется для акции \"старая/новая
                  цена\".  Если не передано - будет использован null в качестве значения
                format: double
                nullable: true
                example: 1234.56
              price:
                type: number
                description: Цена продукта. Продукты с нулевой ценой отбрасываются
                format: double
                example: 1224.56
              sortOrder:
                type: integer
                format: int32
                description: "Порядок сортировки от меньшего к большему. Если не у\
                  казан, считаем за 100"
                example: 0
              vat:
                type: integer
                description: "НДС, включенный в стоимость, в процентах, если не ук\
                  азан, считается за 0"
                example: 20
              serviceCodesUz:
                required:
                  - mxikCodeUz
                type: object
                properties:
                  mxikCodeUz:
                    type: string
                    description: mxik код блюда (ИКПУ)
                    nullable: false
                    example: "10202001010000004"
                  packageCodeUz:
                    type: string
                    description: Код упаковки
                    nullable: false
                    example: "1372944"
              vendorCode:
                type: string
                description: Артикул продукта в системе партнера
              volume:
                required:
                  - unit
                  - value
                type: object
                properties:
                  value:
                    type: integer
                    description: Значение объема
                    example: 100
                  unit:
                    type: string
                    description: Единица измерения обьема
                    example: DMQ
                    enum:
                      - CMQ
                      - DMQ
                description: Объем занимаемый продуктом. Полезен для расчета доставки.
                  Может существенно отличатся от номинального объема продукта"
      description: Актуальная номенклатура продуктов
      x-deprecated: false
    OrderCancellation:
      required:
        - eatsId
      type: object
      properties:
        comment:
          type: string
          description: Описание причин отмены (может быть пустым)
          example: Отказ клиента
        eatsId:
          type: string
          description: Сквозной идентификатор заказа на стороне Uzum Tezkor в формате
            DDDDDD-DDDDDD
          example: 190330-123456
    OrderStatus:
      required:
        - status
      type: object
      properties:
        comment:
          maxLength: 500
          type: string
          description: Комментарий к смене статуса
          example: "null"
        status:
          type: string
          description: |-
            Статус заказа. Должен быть допустимым - т.е. приготовленный заказ нельзя снова сделать новым. Переход по статусам возможен только в указанном направлении - от NEW до DELIVERED. Исключения: в статус CANCELLED заказ может перейти на любом этапе, в статус POSTPONED заказ может перейти на любом не терминальном (не DELIVERED, не CANCELLED) этапе.
            Описание статусов: NEW - новый, только отправлен в ресторан. ACCEPTED_BY_RESTAURANT - заказ подтвержден рестораном. POSTPONED - заказ отложен, идет обсуждение с клиентом, меняется состав, и т.п. COOKING - началось приготовление заказа. READY - заказ приготовлен. TAKEN_BY_COURIER - курьер забрал заказ из ресторана. DELIVERED - заказ завершен. CANCELLED - заказ отменён.
            NEW -> ACCEPTED_BY_RESTAURANT -> COOKING -> READY -> TAKEN_BY_COURIER -> DELIVERED. Из любого статуса -> CANCELLED
          enum:
            - NEW
            - ACCEPTED_BY_RESTAURANT
            - POSTPONED
            - COOKING
            - READY
            - TAKEN_BY_COURIER
            - DELIVERED
            - CANCELLED
        updatedAt:
          type: string
          description: "Дата, когда сменился статус заказа, в формате RFC3339 с др\
            обной частью секунд (Y-m-d\\TH:i:s.uP)"
          format: date-time
          example: 1937-01-01T12:00:27.87+00:20
    YGroceryOrderV1:
      required:
        - comment
        - eatsId
        - items
        - promos
      type: object
      properties:
        comment:
          type: string
          description: Дополнительная информация о заказе
          example: "Дополнительная информация о заказе: ..."
        deliveryInfo:
          type: object
          properties:
            courierArrivementDate:
              type: string
              description: "Дата, когда придет курьер в ресторан, в формате RFC3339\
                \ с дробной частью секунд (Y-m-d\\TH:i:s.uP)"
              format: date-time
              example: 1937-01-01T12:00:27.87+00:20
          description: Информация о доставке
        eatsId:
          type: string
          description: Сквозной идентификатор заказа на стороне Uzum Tezkor в формате
            DDDDDD-DDDDDD
          example: 190330-123456
        items:
          type: array
          items:
            required:
              - id
              - modifications
              - price
              - promos
              - quantity
            type: object
            properties:
              id:
                type: string
                description: ID позиции меню в системе партнера
                example: 937c57f6-4508-4858-be7f-20691a16fbb0
              modifications:
                type: array
                description: "Список выбранных модификаций. Может быть пустым, пер\
                  едаётся явно, для каждой отдельной позиции в заказе. При заказе\
                  \ двух позиций одного и того же блюда с разным набором модификац\
                  ий - передаются разные позиции, с разными списками \"modifications\""
                items:
                  required:
                    - id
                    - price
                    - quantity
                  type: object
                  properties:
                    id:
                      type: string
                      description: ID модификатора в системе партнера
                      example: 937c57f6-4508-4858-be7f-20691a16fbb0
                    name:
                      type: string
                      description: Наименование модификатора
                      example: Европейские приборы
                    price:
                      type: number
                      description: Цена модификатора для пункта меню (например - дополнительный
                        соус)
                      format: double
                      example: 100.0
                    quantity:
                      type: integer
                      description: Количество в заказе
                      example: 3
              name:
                type: string
                description: Наименование позиции меню
                example: Пицца Пепперони
              price:
                type: number
                description: Стоимость одной данной позиции вместе со стоимостью модификаций
                format: double
                example: 100.0
              promos:
                type: array
                description: "Список акций, действующих на текущее блюдо. Если у б\
                  люда объект \"promos\" не пустой, значит на него действует акция\
                  \ в системе партнера. Если пустой - это означает, что на блюдо н\
                  е действуют никакие акции"
                items:
                  $ref: '#/components/schemas/YGroceryOrderV1/properties/promos/items'
              quantity:
                type: integer
                description: Количество позиции в заказе
                example: 3
        paymentInfo:
          required:
            - itemsCost
            - paymentType
          type: object
          properties:
            itemsCost:
              type: number
              description: Полная стоимость блюд в заказе
              format: double
              example: 100.0
            paymentType:
              type: string
              description: Информация о типе оплаты
              enum:
                - CARD
                - CASH
        persons:
          type: integer
          description: "Количество персон, на которых делается заказ. Может влиять\
