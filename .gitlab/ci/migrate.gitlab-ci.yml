# =============================================================================
# Migrate stage – run golang-migrate migrations via SSH on the target server
# =============================================================================
# Uses appleboy/drone-ssh – the same Go-based SSH engine that powers
# appleboy/ssh-action in GitHub Actions. This avoids Alpine OpenSSH
# libcrypto compatibility issues with certain key formats.
#
# The migration tool is golang-migrate/migrate (installed in the Dockerfile).
# The run_migration.sh script loads .env, constructs DB_URL, and runs migrate up.
#
# Production migrations are MANUAL (require click in pipeline UI).
# =============================================================================

# ---- hidden template --------------------------------------------------------
.migrate_template:
  stage: migrate
  image: appleboy/drone-ssh
  needs:
    - job: build
      artifacts: true
  script:
    - >-
      drone-ssh
      --host "$_SSH_HOST"
      --port "${_SSH_PORT:-22}"
      --username "$_SSH_USER"
      --key "$(cat $_SSH_PRIVATE_KEY)"
      --script "
        set -e;
        echo '🔄 Pulling image: $IMAGE_TAG';
        echo '$DOCKER_PASSWORD' | docker login -u '$DOCKER_USERNAME' --password-stdin;
        docker pull '$IMAGE_TAG';
        echo '🗄️  Running migrations...';
        docker run --rm
          --env-file '$ENV_PATH'
          -v '$ENV_PATH:$ENV_PATH:ro'
          --network host
          '$IMAGE_TAG'
          /app/scripts/run_migration.sh;
        echo '✅ Migrations completed.';
      "

# ---- DEV migration (automatic) ---------------------------------------------
migrate:dev:
  extends: .migrate_template
  variables:
    _SSH_HOST: "$DEV_SSH_HOST"
    _SSH_USER: "$DEV_SSH_USER"
    _SSH_PORT: "$DEV_SSH_PORT"
    _SSH_PRIVATE_KEY: "$DEV_SSH_PRIVATE_KEY"
    ENV_PATH: "$DEV_ENV_PATH"
  environment:
    name: dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

# ---- STAGING migration (automatic) -----------------------------------------
migrate:staging:
  extends: .migrate_template
  variables:
    _SSH_HOST: "$STAGING_SSH_HOST"
    _SSH_USER: "$STAGING_SSH_USER"
    _SSH_PORT: "$STAGING_SSH_PORT"
    _SSH_PRIVATE_KEY: "$STAGING_SSH_PRIVATE_KEY"
    ENV_PATH: "$STAGING_ENV_PATH"
  environment:
    name: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'

# ---- PRODUCTION migration (manual gate) ------------------------------------
migrate:production:
  extends: .migrate_template
  variables:
    _SSH_HOST: "$PROD_SSH_HOST"
    _SSH_USER: "$PROD_SSH_USER"
    _SSH_PORT: "$PROD_SSH_PORT"
    _SSH_PRIVATE_KEY: "$PROD_SSH_PRIVATE_KEY"
    ENV_PATH: "$PROD_ENV_PATH"
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
      allow_failure: false
