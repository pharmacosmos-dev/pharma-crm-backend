# =============================================================================
# Test & Build stage – run tests, lint, then build + push Docker image
# =============================================================================
# Design decision: Docker image approach (not bare binary upload).
# Rationale:
#   - The project already uses a multi-stage Dockerfile.
#   - Existing GitHub Actions pipelines deploy Docker containers.
#   - Docker gives reproducible builds, built-in rollback via image tags,
#     and eliminates "works on my machine" issues.
#   - Migrations are embedded in the image (COPY migrations/ ...).
# =============================================================================

