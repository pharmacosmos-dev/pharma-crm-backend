# --------------- BUILD & PUSH DOCKER IMAGE -----------------------------------
build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
  script:
    - |
      # Tag with commit SHA for traceability and branch-latest for convenience
      IMAGE_TAG="${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      IMAGE_LATEST="${DOCKER_IMAGE}:${CI_COMMIT_REF_SLUG}-latest"

      docker build \
        --cache-from "${DOCKER_IMAGE}:buildcache" \
        -t "$IMAGE_TAG" \
        -t "$IMAGE_LATEST" \
        .

      docker push "$IMAGE_TAG"
      docker push "$IMAGE_LATEST"

      # Push buildcache layer for future builds
      docker tag "$IMAGE_TAG" "${DOCKER_IMAGE}:buildcache"
      docker push "${DOCKER_IMAGE}:buildcache" || true

      # Persist the image tag for downstream jobs
      echo "IMAGE_TAG=${IMAGE_TAG}" > build.env
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "staging"'
    - if: '$CI_COMMIT_BRANCH == "master"'
