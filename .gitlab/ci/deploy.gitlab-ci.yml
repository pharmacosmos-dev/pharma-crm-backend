# =============================================================================
# Deploy stage – pull Docker image on the server and restart the container
# =============================================================================
# Strategy:
#   SSH into the target server → docker pull → stop old container → start new.
#   Uses --network host (matching existing GitHub Actions deployment).
#   Mounts .env, uploads, and logger directories from the host.
#
# This mirrors the existing prod-ci-cd.yml / dev-cicd.yml GitHub Actions
# workflows but uses GitLab environments for tracking and variable scoping.
# =============================================================================

# ---- hidden template --------------------------------------------------------
.deploy_template:
  stage: deploy
  image: alpine:3.20
  needs:
    - job: build
      artifacts: true
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    # GitLab File-type variable provides a path, so we cp (not echo) the key
    - cp "$_SSH_PRIVATE_KEY" ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -p "${_SSH_PORT:-22}" "$_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - |
      ssh -o StrictHostKeyChecking=no -p "${_SSH_PORT:-22}" "${_SSH_USER}@${_SSH_HOST}" << REMOTE_SCRIPT
        set -e
        echo "🔄 Pulling image: ${IMAGE_TAG}"
        echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
        docker pull "${IMAGE_TAG}"

        echo "🛑 Stopping old container..."
        docker stop "${CONTAINER_NAME}" 2>/dev/null || true
        docker rm   "${CONTAINER_NAME}" 2>/dev/null || true

        echo "🚀 Starting new container..."
        docker run -d \
          --name "${CONTAINER_NAME}" \
          --network host \
          -p "${CONTAINER_PORT}" \
          --env-file "${ENV_PATH}" \
          -v "${UPLOADS_PATH}:/app/uploads" \
          -v "${LOGGER_PATH}:/app/logger" \
          --restart unless-stopped \
          "${IMAGE_TAG}"

        echo "✅ Deployed ${IMAGE_TAG}"

        # ----- Prune old images to save disk (keep N most recent) -----
        echo "🧹 Pruning old images (keeping last ${ROLLBACK_KEEP})..."
        docker images "${DOCKER_IMAGE}" --format '{{.Tag}} {{.ID}}' \
          | grep -v 'buildcache' \
          | grep -v '<none>' \
          | head -n -${ROLLBACK_KEEP} \
          | awk '{print \$2}' \
          | xargs -r docker rmi || true
      REMOTE_SCRIPT

# ---- DEV deploy (automatic on dev branch) ----------------------------------
deploy:dev:
  extends: .deploy_template
  needs:
    - job: build
      artifacts: true
    - job: migrate:dev
  variables:
    _SSH_HOST: "$DEV_SSH_HOST"
    _SSH_USER: "$DEV_SSH_USER"
    _SSH_PORT: "$DEV_SSH_PORT"
    _SSH_PRIVATE_KEY: "$DEV_SSH_PRIVATE_KEY"
    ENV_PATH: "$DEV_ENV_PATH"
    UPLOADS_PATH: "$DEV_UPLOADS_PATH"
    LOGGER_PATH: "$DEV_LOGGER_PATH"
  environment:
    name: dev
    url: http://$DEV_SSH_HOST:8090    # placeholder – update with real URL
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

# ---- STAGING deploy (automatic on staging branch) --------------------------
deploy:staging:
  extends: .deploy_template
  needs:
    - job: build
      artifacts: true
    - job: migrate:staging
  variables:
    _SSH_HOST: "$STAGING_SSH_HOST"
    _SSH_USER: "$STAGING_SSH_USER"
    _SSH_PORT: "$STAGING_SSH_PORT"
    _SSH_PRIVATE_KEY: "$STAGING_SSH_PRIVATE_KEY"
    ENV_PATH: "$STAGING_ENV_PATH"
    UPLOADS_PATH: "$STAGING_UPLOADS_PATH"
    LOGGER_PATH: "$STAGING_LOGGER_PATH"
  environment:
    name: staging
    url: http://$STAGING_SSH_HOST:8090
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'

# ---- PRODUCTION deploy (automatic after manual migration gate) --------------
deploy:production:
  extends: .deploy_template
  needs:
    - job: build
      artifacts: true
    - job: migrate:production
  variables:
    _SSH_HOST: "$PROD_SSH_HOST"
    _SSH_USER: "$PROD_SSH_USER"
    _SSH_PORT: "$PROD_SSH_PORT"
    _SSH_PRIVATE_KEY: "$PROD_SSH_PRIVATE_KEY"
    ENV_PATH: "$PROD_ENV_PATH"
    UPLOADS_PATH: "$PROD_UPLOADS_PATH"
    LOGGER_PATH: "$PROD_LOGGER_PATH"
  environment:
    name: production
    url: http://$PROD_SSH_HOST:8090
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
