# =============================================================================
# Deploy stage – pull Docker image on the server and restart the container
# =============================================================================
# Uses appleboy/drone-ssh – the same Go-based SSH engine that powers
# appleboy/ssh-action in GitHub Actions.
# =============================================================================

# ---- hidden template --------------------------------------------------------
.deploy_template:
  stage: deploy
  image: appleboy/drone-ssh
  needs:
    - job: build
      artifacts: true
  script:
    - >-
      drone-ssh
      --host "$_SSH_HOST"
      --port "${_SSH_PORT:-22}"
      --username "$_SSH_USER"
      --key "$(cat $_SSH_PRIVATE_KEY)"
      --script "
        set -e;
        echo '🔄 Pulling image: $IMAGE_TAG';
        echo '$DOCKER_PASSWORD' | docker login -u '$DOCKER_USERNAME' --password-stdin;
        docker pull '$IMAGE_TAG';
        echo '🛑 Stopping old container...';
        docker stop '$CONTAINER_NAME' 2>/dev/null || true;
        docker rm   '$CONTAINER_NAME' 2>/dev/null || true;
        echo '🚀 Starting new container...';
        docker run -d
          --name '$CONTAINER_NAME'
          --network host
          -p '$CONTAINER_PORT'
          --env-file '$ENV_PATH'
          -v '$UPLOADS_PATH:/app/uploads'
          -v '$LOGGER_PATH:/app/logger'
          --restart unless-stopped
          '$IMAGE_TAG';
        echo '✅ Deployed $IMAGE_TAG';
      "

# ---- DEV deploy (automatic on dev branch) ----------------------------------
deploy:dev:
  extends: .deploy_template
  needs:
    - job: build
      artifacts: true
    - job: migrate:dev
  variables:
    _SSH_HOST: "$DEV_SSH_HOST"
    _SSH_USER: "$DEV_SSH_USER"
    _SSH_PORT: "$DEV_SSH_PORT"
    _SSH_PRIVATE_KEY: "$DEV_SSH_PRIVATE_KEY"
    ENV_PATH: "$DEV_ENV_PATH"
    UPLOADS_PATH: "$DEV_UPLOADS_PATH"
    LOGGER_PATH: "$DEV_LOGGER_PATH"
  environment:
    name: dev
    url: http://$DEV_SSH_HOST:8090
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

# ---- STAGING deploy (automatic on staging branch) --------------------------
deploy:staging:
  extends: .deploy_template
  needs:
    - job: build
      artifacts: true
    - job: migrate:staging
  variables:
    _SSH_HOST: "$STAGING_SSH_HOST"
    _SSH_USER: "$STAGING_SSH_USER"
    _SSH_PORT: "$STAGING_SSH_PORT"
    _SSH_PRIVATE_KEY: "$STAGING_SSH_PRIVATE_KEY"
    ENV_PATH: "$STAGING_ENV_PATH"
    UPLOADS_PATH: "$STAGING_UPLOADS_PATH"
    LOGGER_PATH: "$STAGING_LOGGER_PATH"
  environment:
    name: staging
    url: http://$STAGING_SSH_HOST:8090
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'

# ---- PRODUCTION deploy (automatic after manual migration gate) --------------
deploy:production:
  extends: .deploy_template
  needs:
    - job: build
      artifacts: true
    - job: migrate:production
  variables:
    _SSH_HOST: "$PROD_SSH_HOST"
    _SSH_USER: "$PROD_SSH_USER"
    _SSH_PORT: "$PROD_SSH_PORT"
    _SSH_PRIVATE_KEY: "$PROD_SSH_PRIVATE_KEY"
    ENV_PATH: "$PROD_ENV_PATH"
    UPLOADS_PATH: "$PROD_UPLOADS_PATH"
    LOGGER_PATH: "$PROD_LOGGER_PATH"
  environment:
    name: production
    url: http://$PROD_SSH_HOST:8090
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
